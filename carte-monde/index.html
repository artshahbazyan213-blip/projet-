<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte interactive des pays</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
    <button id="darkModeToggle", i class="fas fa-eiffel-tower, onclick="toggleDarkMode()">🌙 Mode Sombre</button>
    <h1>Carte interactive des pays ✨</h1>
    <p>Clique sur un pays pour voir sa carte, ses lieux célèbres et sa position géographique.</p>
    <input type="text" id="searchInput" placeholder="Rechercher un pays..." onkeyup="filterCountries()">
</header>

<main>
    <div class="info">
        <h2>Informations sur le pays</h2>
        <p id="details">Clique sur un pays pour afficher les infos.</p>

        <div class="buttons">
            <button data-country="France", i class="fas fa-eiffel-tower"></i> France</button>
            <button data-country="USA", i class="fas fa-landmark"></i> USA</button>
            <button data-country="Japon", i class="fas fa-torii-gate"></i> Japon</button>
        </div>

        <div class="country-map" id="countryMapContainer">
            <!-- La carte du pays s'affichera ici -->
        </div>
    </div>
</main>

<footer>
    <div class="map-container">
        <img src="images/world-map.jpg" alt="Carte du monde">
    </div>
</footer>

<script src="js/script.js"></script>
</body>
</html>

        /* Dark overlay on top of the map */
        .bg-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 15, 0.82);
            z-index: 1;
        }

        /* Main content */
        .content {
            position: relative;
            z-index: 2;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px 60px;
        }

        .title {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: clamp(1.8rem, 5vw, 3.5rem);
            color: #00d4ff;
            text-align: center;
            letter-spacing: 0.05em;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.6), 0 0 60px rgba(0, 212, 255, 0.3);
            margin-bottom: 12px;
        }

        .subtitle {
            font-family: 'Exo 2', sans-serif;
            font-weight: 300;
            font-size: clamp(0.85rem, 2vw, 1.1rem);
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        .search-wrapper {
            width: 100%;
            max-width: 560px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 18px 60px 18px 24px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(0, 212, 255, 0.35);
            border-radius: 50px;
            color: #fff;
            font-family: 'Exo 2', sans-serif;
            font-size: 1.05rem;
            font-weight: 400;
            letter-spacing: 0.03em;
            outline: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 0 0 0 rgba(0, 212, 255, 0);
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-weight: 300;
        }

        .search-input:focus {
            border-color: rgba(0, 212, 255, 0.75);
            background: rgba(255, 255, 255, 0.09);
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.2), 0 0 60px rgba(0, 212, 255, 0.08);
        }

        .search-icon {
            position: absolute;
            right: 22px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(0, 212, 255, 0.6);
            font-size: 1.1rem;
            pointer-events: none;
        }

        /* Animated pulse ring */
        .pulse-ring {
            position: absolute;
            inset: -4px;
            border-radius: 50px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            animation: pulse-border 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes pulse-border {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.01); }
        }

        /* Results dropdown */
        .results-dropdown {
            z-index: 100;
            position: absolute;
            top: calc(100% + 12px);
            left: 0;
            right: 0;
            background: rgba(5, 10, 30, 0.95);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 16px;
            backdrop-filter: blur(20px);
            overflow-x: hidden;
            display: none;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .results-dropdown.active {
            display: block;
            animation: slideDown 0.2s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-item {
            padding: 14px 24px;
            color: rgba(255, 255, 255, 0.75);
            font-family: 'Exo 2', sans-serif;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-item:hover {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            padding-left: 30px;
        }

        .result-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(0, 212, 255, 0.5);
            flex-shrink: 0;
        }

        /* Country card */
        .country-card {
            z-index: 10;
            margin-top: 40px;
            width: 100%;
            max-width: 560px;
            background: rgba(5, 10, 30, 0.75);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 20px;
            padding: 28px 32px;
            backdrop-filter: blur(16px);
            display: none;
            animation: fadeUp 0.4s ease-out;
        }

        .country-card.visible {
            display: block;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-country-name {
            font-family: 'Orbitron', monospace;
            font-size: 1.4rem;
            font-weight: 700;
            color: #00d4ff;
            margin-bottom: 20px;
            letter-spacing: 0.08em;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .info-label {
            font-size: 0.72rem;
            color: rgba(0, 212, 255, 0.55);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 600;
        }

        .info-value {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 300;
        }

        .lieux-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.07);
        }

        .lieux-title {
            font-size: 0.72rem;
            color: rgba(0, 212, 255, 0.55);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .lieux-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .lieu-tag {
            background: rgba(0, 212, 255, 0.08);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 0.82rem;
            color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>

const allNames = Object.keys(countries);

function filterCountries() {
    const query = document.getElementById("searchInput").value.toLowerCase().trim();
    const dropdown = document.getElementById("resultsDropdown");

    if (!query) {
        dropdown.classList.remove("active");
        return;
    }

    const matches = allNames.filter(n => n.toLowerCase().includes(query));
    
    if (matches.length === 0) {
        dropdown.classList.remove("active");
        return;
    }

    dropdown.innerHTML = matches.map(name => `
        <div class="result-item" onclick="selectCountry('${name}')">
            <span class="result-dot"></span>${name}
        </div>
    `).join('');
    
    dropdown.classList.add("active");
}

function showDropdown() {
    const query = document.getElementById("searchInput").value.toLowerCase().trim();
    if (query) filterCountries();
}

function selectCountry(name) {
    const c = countries[name];
    document.getElementById("searchInput").value = name;
    document.getElementById("resultsDropdown").classList.remove("active");

    document.getElementById("cardName").textContent = name;

    document.getElementById("cardInfo").innerHTML = `
        <div class="info-item">
            <span class="info-label">Capitale</span>
            <span class="info-value">${c.capitale}</span>
        </div>
        <div class="info-item">
            <span class="info-label">Population</span>
            <span class="info-value">${c.population}</span>
        </div>
        <div class="info-item">
            <span class="info-label">Langue</span>
            <span class="info-value">${c.langue}</span>
        </div>
        <div class="info-item">
            <span class="info-label">Continent</span>
            <span class="info-value">${c.continent}</span>
        </div>
        
    `;

    document.getElementById("cardLieux").innerHTML = c.lieux.map(l =>
        `<span class="lieu-tag">${l}</span>`
    ).join('');

    const mapEl = document.getElementById("cardMap");
    if (c.mapImage) {
        mapEl.innerHTML = '<div style="margin-top:4px"><div style="font-size:0.72rem;color:rgba(0,212,255,0.55);text-transform:uppercase;letter-spacing:0.12em;font-weight:600;margin-bottom:10px;">Carte</div><img src="' + c.mapImage + '" alt="Carte de ' + name + '" style="width:100%;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.5);"></div>';
        mapEl.style.display = "block";
    } else {
        mapEl.innerHTML = "";
        mapEl.style.display = "none";
    }

    const card = document.getElementById("countryCard");
    card.classList.remove("visible");
    void card.offsetWidth;
    card.classList.add("visible");
}

function resetPage() {
    document.getElementById("searchInput").value = "";
    document.getElementById("resultsDropdown").classList.remove("active");
    const card = document.getElementById("countryCard");
    card.classList.remove("visible");
    window.scrollTo({ top: 0, behavior: "smooth" });
}

// Close dropdown when clicking outside
document.addEventListener("click", (e) => {
    if (!e.target.closest(".search-wrapper")) {
        document.getElementById("resultsDropdown").classList.remove("active");
    }
});
</script>
</body>
</html>
